<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joueur - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/style-login.css') }}">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="form-content active">
                <div style="text-align: center;">
                    <span class="admin-badge">P1 READY</span>
                </div>

                {% if request.args.get('line') %}
                <div style="text-align: center; margin-top: 15px; margin-bottom: 15px; color: #00CCFF; font-size: 0.7em;">
                    LINE: {{ request.args.get('line') }}
                </div>
                {% endif %}

                <h2>LOGIN / SIGN IN</h2>
                
                {% if error %}
                    <div class="message error">{{ error }}</div>
                {% endif %}

                <form method="POST" action="{{ url_for('player.login') }}">
                    <input type="hidden" name="line" value="{{ request.args.get('line', '') }}">

                    <div class="form-group">
                        <label for="pseudo">PSEUDO (MAX 15 CHARS)</label>
                        <input type="text" id="pseudo" name="pseudo" required maxlength="15" placeholder="YOUR PSEUDO">
                    </div>

                    <div class="form-group">
                        <label for="contact_method">CONTACT METHOD</label>
                        <select id="contact_method" name="contact_method" required>
                            <option value="Instagram">INSTAGRAM</option>
                            <option value="Mail">MAIL</option>
                            <option value="X">X (TWITTER)</option>
                            <option value="Téléphone">PHONE</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="contact_info">COORDINATES (MAX 30 CHARS)</label>
                        <input type="text" id="contact_info" name="contact_info" required maxlength="30" placeholder="@PSEUDO OR NUMBER">
                    </div>

                    <button type="submit">ENTER GAME</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
