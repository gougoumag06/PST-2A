<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InGame - Épreuves</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/InGame.css') }}">
</head>
<body>
    <div class="side-bg left-bg">
        <img src="{{ url_for('static', filename='spite.png') }}" class="floating-logo l-1" alt="logo">
        <img src="{{ url_for('static', filename='spite.png') }}" class="floating-logo l-2" alt="logo">
    </div>
    <div class="side-bg right-bg">
        <img src="{{ url_for('static', filename='spite.png') }}" class="floating-logo r-1" alt="logo">
        <img src="{{ url_for('static', filename='spite.png') }}" class="floating-logo r-2" alt="logo">
    </div>
    <h1>🕹️ STAGE ACTIVE 🕹️</h1>
 
    <div class="ingame-layout">
        
        <div class="side-panel">
            <div id="system-hub" class="retro-box status-box">
                <h3 style="color: #FFF; margin-top: 0; font-size: 0.8em; letter-spacing: 2px;">SYSTEM HUB</h3>
                
                <div id="status" style="margin-bottom: 25px;">
                    <p class="status-message" style="color: #00FF00; font-size: 0.7em; animation: blink 2s infinite;">⏳ EN ATTENTE...</p>
                </div>

                <div id="main-chrono-display" style="border-top: 2px dashed #444; padding-top: 20px;">
                   
                </div>
            </div>

            <div class="controls-container">
                <button id="btn-stop" onclick="arreterJeu()" class="btn-stop" disabled style="width: 100%;">
                    ⏹️ ABORT MISSION
                </button>
            </div>
        </div>

        <div class="game-panel">
            
            <div id="enigme-container" class="retro-box mastermind-box" style="display: none;">
                <h2 style="color: #FFFF00;">🎨 MASTERMIND MATRIX</h2>
                <p style="font-size: 0.6em; color: #888; margin-bottom: 20px;">FIND THE CODE (KEYS: K, R, B, P, Y, G)</p>
                
                <div id="mm-history" style="margin-bottom: 20px; font-family: monospace; font-size: 1.2em;"></div>
                
                <div style="margin-bottom: 20px;">
                    <select id="mm-col1" class="mm-select"><option value="">COL 1</option></select>
                    <select id="mm-col2" class="mm-select"><option value="">COL 2</option></select>
                    <select id="mm-col3" class="mm-select"><option value="">COL 3</option></select>
                    <select id="mm-col4" class="mm-select"><option value="">COL 4</option></select>
                </div>
                <div id="mm-result" style="font-size: 0.7em; min-height: 25px; color: #FFFF00;"></div>
            </div>

            <div id="quiz-survie-container" class="retro-box quiz-box" style="display: none;">
                <h2 style="color: #00CCFF;">🚀 SURVIVAL MISSION</h2>
                
                <div id="quiz-error-msg" style="color: #FF0055; font-size: 0.6em; min-height: 24px;"></div>
                <h3 id="quiz-question-text" style="font-size: 0.8em; line-height: 1.6; min-height: 60px;">PREPARING GENERATOR...</h3>
                <div id="quiz-choices" style="display: flex; flex-direction: column; gap: 10px;"></div>
                <div style="margin-top: 20px; font-size: 0.6em; color: #888;">QUESTION <span id="quiz-q-num">1</span> / 5</div>
                
                <button onclick="bypassQuiz()" class="bypass-btn">⏩ BYPASS DEVS</button>
            </div>

            <div id="maboul-container" class="retro-box maboul-box" style="display: none;">
                <h2 style="color: #FF0055;">⚡ OPERATION: DR MABOUL</h2>
                <div id="maboul-status-box" class="maboul-box-inner status-attente">
                    <div id="maboul-instruction" class="maboul-instruction">INITIALISATION...</div>
                    <div id="maboul-alert" style="color: #FFFF00; font-size: 1.2em; font-weight: bold; margin-top: 15px; min-height: 60px;"></div>
                </div>
            </div>

        </div>
    </div>
    
    <script src="{{ url_for('static', filename='JS/InGame.js') }}"></script>
</body>
</html>
